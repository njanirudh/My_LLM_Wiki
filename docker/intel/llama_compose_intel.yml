services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-intel
    container_name: llama-intel

    stdin_open: true
    tty: true

    ports:
      - "8080:8080"

    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card1:/dev/dri/card1

    volumes:
      # models
      - ${HOME}/LLMs:/LLMs
      - ${HOME}/LLMs/My_LLM_Wiki/configs:/configs:ro

    command: >
      --models-preset /configs/llama_server/server_intel.ini

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    restart: "no"
